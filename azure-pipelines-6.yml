trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:

# 🔹 BUILD STAGE
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'

# 🔹 TEST STAGE
- stage: Test
  displayName: Test Stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: TestJob
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'test'

    - task: PublishTestResults@2
      inputs:
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        testRunTitle: 'Maven Test Results'